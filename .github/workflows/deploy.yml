name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install and test
        run: |
          npm ci
          npm run lint
          npm test
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_HOST }}
          username: ${{ secrets.PRODUCTION_SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SERVER_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SERVER_PORT }}
          script: |
            cd /opt/agente-virtual-cgrisala
            git pull origin main
            
            # Deploy n8n + Evolution
            cd n8n-docker
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            
            # Deploy API
            cd ../backend
            npm ci --production
            npm run build
            docker build -t agente-api:latest .
            docker compose -f ../n8n-docker/docker-compose.prod.yml up -d
            
            # Run migrations
            docker compose -f ../n8n-docker/docker-compose.prod.yml exec -T api npm run db:migrate
            
            echo "Deployment completed successfully"
      
      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Deployment to production successful"
      
      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed"
          exit 1
